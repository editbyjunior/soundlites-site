<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Soundlites</title>
    <meta name="robots" content="noindex">
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #111312;
        background: #f4f5f1;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(720px, calc(100vw - 48px));
      }

      h1 {
        margin: 0 0 18px;
        font-size: clamp(42px, 8vw, 84px);
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: #555b57;
        font-size: 18px;
        line-height: 1.6;
      }

      a {
        color: inherit;
        text-decoration-thickness: 1px;
        text-underline-offset: 5px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Soundlites</h1>
      <p>This site is being consolidated. For current work, email <a href="mailto:hello@soundlites.io">hello@soundlites.io</a>.</p>
    </main>
  </body>
</html>
