name: Repo Standards

on:
  pull_request:
  push:
    branches: [main]

jobs:
  standards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Run gitleaks
        run: gitleaks detect --source . --redact --no-banner

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: python -m pip install pre-commit
      - run: SKIP=gitleaks pre-commit run --from-ref origin/main --to-ref HEAD
